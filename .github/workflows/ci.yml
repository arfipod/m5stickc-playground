name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  platformio:
    name: PlatformIO build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Build firmware
        run: pio run -e m5stickcplus

      - name: Print firmware size
        run: pio run -e m5stickcplus --target size

      - name: Collect firmware artifacts
        run: |
          mkdir -p dist
          cp .pio/build/m5stickcplus/firmware.bin dist/m5stickcplus-firmware.bin
          cp .pio/build/m5stickcplus/firmware.elf dist/m5stickcplus-firmware.elf
          cp .pio/build/m5stickcplus/firmware.map dist/m5stickcplus-firmware.map
          sha256sum dist/* > dist/SHA256SUMS

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: m5stickcplus-firmware
          path: dist/
          if-no-files-found: error
