name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  firmware-release:
    name: Build and publish firmware
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set release tag
        id: release_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Build firmware
        run: pio run -e m5stickcplus

      - name: Package firmware
        run: |
          mkdir -p dist
          cp .pio/build/m5stickcplus/firmware.bin dist/m5stickcplus-${{ steps.release_tag.outputs.tag }}.bin
          cp .pio/build/m5stickcplus/firmware.elf dist/m5stickcplus-${{ steps.release_tag.outputs.tag }}.elf
          cp .pio/build/m5stickcplus/firmware.map dist/m5stickcplus-${{ steps.release_tag.outputs.tag }}.map
          sha256sum dist/* > dist/SHA256SUMS

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --generate-notes
          gh release upload "$RELEASE_TAG" dist/* --clobber
